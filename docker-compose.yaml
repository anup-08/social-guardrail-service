version: '3.8'

services:

  postgres:
    image: postgres:15
    container_name: social_pg_db
    restart: always
    environment:
      POSTGRES_DB: social_guardrail_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123

    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: social_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  pg_data:
  redis_data: